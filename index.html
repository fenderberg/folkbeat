<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111318" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#F7F7F5" media="(prefers-color-scheme: light)">
<link rel="manifest" href="manifest.webmanifest">
<title>FolkBeat</title>
<style>
  /* ================= DESIGN TOKENS ================= */
  :root {
    --bg: #111318;
    --surface: #1B1E26;
    --surface-2: #252932;
    --border: #2F3440;
    --text: #F2F3F5;
    --text-dim: #9AA0AC;
    --accent: #FFB13D;
    --accent-ink: #231A05;
    --play: #3DDC84;
    --play-ink: #052813;
    --fill: #FF5C7A;
    --fill-ink: #33060F;
    --danger: #FF5C5C;
    --shadow: 0 2px 8px rgb(0 0 0 / .35);
    --radius-s: 10px;
    --radius-m: 16px;
    --radius-l: 24px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #F7F7F5;
      --surface: #FFFFFF;
      --surface-2: #EFEFEC;
      --border: #E2E2DE;
      --text: #1A1C22;
      --text-dim: #6B7078;
      --accent: #E08A00;
      --accent-ink: #FFFFFF;
      --play: #1FA95C;
      --play-ink: #FFFFFF;
      --fill: #E03A5B;
      --fill-ink: #FFFFFF;
      --danger: #D64545;
      --shadow: 0 2px 8px rgb(0 0 0 / .10);
    }
  }
  html[data-theme="dark"] {
    --bg: #111318; --surface: #1B1E26; --surface-2: #252932; --border: #2F3440;
    --text: #F2F3F5; --text-dim: #9AA0AC; --accent: #FFB13D; --accent-ink: #231A05;
    --play: #3DDC84; --play-ink: #052813; --fill: #FF5C7A; --fill-ink: #33060F;
    --danger: #FF5C5C; --shadow: 0 2px 8px rgb(0 0 0 / .35); color-scheme: dark;
  }
  html[data-theme="light"] {
    --bg: #F7F7F5; --surface: #FFFFFF; --surface-2: #EFEFEC; --border: #E2E2DE;
    --text: #1A1C22; --text-dim: #6B7078; --accent: #E08A00; --accent-ink: #FFFFFF;
    --play: #1FA95C; --play-ink: #FFFFFF; --fill: #E03A5B; --fill-ink: #FFFFFF;
    --danger: #D64545; --shadow: 0 2px 8px rgb(0 0 0 / .10); color-scheme: light;
  }
  html[data-theme="dark"] #tabs { background: var(--surface); }
  html[data-theme="dark"] #tabs button.active { background: var(--surface-2); box-shadow: none; }
  html[data-theme="light"] #tabs { background: var(--surface-2); }
  html[data-theme="light"] #tabs button.active { background: var(--surface); box-shadow: var(--shadow); }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "SF Pro", "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
    overflow: hidden;
  }
  button, input, select { font-family: inherit; color: inherit; }
  button { background: none; border: none; cursor: pointer; }
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }

  @keyframes fbBeat { 0%, 15% { opacity: 1; transform: scale(1); } 60%, 100% { opacity: .15; transform: scale(.8); } }
  @keyframes fbPulse { 0%, 100% { opacity: 1; } 50% { opacity: .55; } }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }

  /* ================= TABS ================= */
  #tabsWrap { display: flex; justify-content: center; padding: 14px 16px 4px; flex-shrink: 0; width: 100%; }
  #tabs { display: flex; background: var(--surface); border-radius: 12px; padding: 3px; }
  #tabs button {
    padding: 8px 20px; border-radius: 10px;
    color: var(--text-dim); font-size: 13px; font-weight: 600;
    transition: background 160ms ease-out, color 160ms ease-out;
  }
  #tabs button .tabIcon { display: none; font-size: 21px; line-height: 1; }
  #tabs button.active { background: var(--surface-2); color: var(--accent); font-weight: 700; }
  #appearanceControls {
    position: fixed; z-index: 30; top: 14px; right: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  #themeToggle, #skinSelect {
    min-width: 44px; height: 38px;
    padding: 0 12px; border-radius: 12px; background: var(--surface); color: var(--text-dim);
    border: 1px solid var(--border); font-size: 13px; font-weight: 700;
  }
  #skinSelect { min-width: 104px; cursor: pointer; }
  @media (max-width: 620px) {
    #tabsWrap { justify-content: flex-start; }
    #tabs button { padding-inline: 12px; }
    #appearanceControls { right: 8px; gap: 6px; }
    #skinSelect { min-width: 78px; width: 78px; padding-inline: 7px; }
    #themeToggle { min-width: 40px; width: 40px; padding: 0; font-size: 0; }
    #themeToggle::after { content: "◐"; font-size: 18px; }
  }
  @media (prefers-color-scheme: light) {
    #tabs button.active { background: var(--surface); box-shadow: var(--shadow); }
    #tabs { background: var(--surface-2); }
  }

  main {
    flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden;
    width: 100%; max-width: 560px;
  }
  main[hidden] { display: none; }

  .cap { font-size: 12px; font-weight: 500; letter-spacing: 0.06em; color: var(--text-dim); }
  .num { font-variant-numeric: tabular-nums; }

  /* ================= SPELER ================= */
  #songBar { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px 0; }
  #songBar[hidden] { display: none; }
  #songBar .nav {
    width: 44px; height: 44px; border-radius: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 22px;
  }
  #songTitleWrap { text-align: center; min-width: 0; }
  #songName { font-size: 17px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #songPos { font-size: 13px; color: var(--text-dim); font-variant-numeric: tabular-nums; }

  #stageCard {
    margin: 10px 16px 0; flex-shrink: 0;
    background: var(--surface); border-radius: var(--radius-l); box-shadow: var(--shadow);
    padding: 18px 20px 16px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  #bpmRow { display: flex; align-items: center; gap: 14px; }
  #bpmBig {
    font-size: clamp(64px, 20vh, 96px); font-weight: 700; line-height: 1;
    font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
  }
  #beatDot { width: 18px; height: 18px; border-radius: 50%; background: var(--surface-2); }
  #beatDot.pulse { background: var(--accent); }
  #bpmCap { margin-top: -6px; }
  #stateBand {
    align-self: stretch; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; font-weight: 800; letter-spacing: 0.12em;
    background: var(--surface-2); color: var(--text-dim);
    transition: background 240ms ease-out, color 240ms ease-out;
  }
  #stateBand.playing { background: var(--play); color: var(--play-ink); }
  #stateBand.fill { background: var(--fill); color: var(--fill-ink); animation: fbPulse 0.6s ease-in-out infinite; }
  #stateBand.preview { background: var(--accent); color: var(--accent-ink); }
  @media (prefers-reduced-motion: reduce) { #stateBand.fill { animation: none; } }
  #beatRow { align-self: stretch; display: flex; gap: 6px; }
  #beatRow .seg { flex: 1; height: 12px; border-radius: 6px; background: var(--surface-2); }
  #beatRow .seg:first-child { flex: 1.6; }
  #beatRow .seg.on { background: var(--accent); }

  .chipSec { display: flex; flex-direction: column; gap: 8px; padding: 14px 16px 0; flex-shrink: 0; }
  .chipRow { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; align-items: center; }
  .chipRow::-webkit-scrollbar { display: none; }
  .chip {
    flex: none; background: var(--surface); border-radius: var(--radius-s);
    padding: 12px 16px; font-size: 14px; font-weight: 600; white-space: nowrap;
    transition: background 160ms ease-out, color 160ms ease-out;
  }
  @media (prefers-color-scheme: light) { .chip { box-shadow: 0 2px 8px rgb(0 0 0 / .06); } }
  .chip.active { background: var(--accent); color: var(--accent-ink); font-weight: 700; }
  .chip .star { color: var(--accent); }
  .chip.active .star { color: var(--accent-ink); }

  #tempoCluster {
    flex: none; display: flex; align-items: center; gap: 8px;
    background: var(--surface); border-radius: 12px; padding: 6px 8px;
  }
  @media (prefers-color-scheme: light) { #tempoCluster { box-shadow: 0 2px 8px rgb(0 0 0 / .06); } }
  #tempoCluster button {
    width: 38px; height: 38px; border-radius: 10px; background: var(--surface-2);
    font-size: 19px; display: flex; align-items: center; justify-content: center;
  }
  #bpmSmall { font-size: 16px; font-weight: 600; font-variant-numeric: tabular-nums; min-width: 34px; text-align: center; }
  #tapBtn {
    width: auto !important; padding: 0 12px; background: none !important;
    border: 1.5px solid var(--accent) !important; color: var(--accent);
    font-size: 12px !important; font-weight: 700; letter-spacing: 0.06em;
  }

  #dirtyBar {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    margin: 14px 16px 0; padding: 8px 10px 8px 16px; flex-shrink: 0;
    border-radius: 14px; border: 1.5px solid color-mix(in srgb, var(--accent) 50%, transparent);
    background: color-mix(in srgb, var(--accent) 7%, transparent);
  }
  #dirtyBar[hidden] { display: none; }
  #dirtyBar .dotmark { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  #dirtyText { flex: 1; font-size: 13px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #saveSongBtn {
    height: 38px; padding: 0 16px; border-radius: 10px; flex-shrink: 0;
    background: var(--accent); color: var(--accent-ink); font-size: 13px; font-weight: 700;
  }

  #transport {
    display: grid; grid-template-columns: 3fr 2fr; grid-template-rows: 88px 120px;
    grid-template-areas: "part fill" "start start";
    gap: 12px; align-items: stretch;
    padding: 14px 16px calc(18px + env(safe-area-inset-bottom)); flex-shrink: 0; margin-top: auto;
  }
  #transport button {
    width: 100%; height: 100%; border-radius: 20px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: transform 120ms ease-out, background 160ms ease-out, border-color 160ms ease-out;
  }
  #transport button:active { transform: scale(.94); }
  #fillBtn {
    grid-area: fill;
    border: 2.5px solid var(--fill); color: var(--fill);
    font-size: 18px; font-weight: 900; letter-spacing: 0.08em; background: var(--surface);
  }
  #fillBtn.on { background: var(--fill); color: var(--fill-ink); animation: fbPulse 0.6s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) { #fillBtn.on { animation: none; } }
  #startBtn {
    grid-area: start; gap: 9px; border-radius: 24px !important;
    border: 4px solid var(--accent); background: var(--accent); color: var(--accent-ink);
    box-shadow: 0 0 0 5px color-mix(in srgb, var(--accent) 18%, transparent), var(--shadow);
  }
  #startBtn .tri {
    width: 0; height: 0; margin-left: 7px;
    border-top: 16px solid transparent; border-bottom: 16px solid transparent;
    border-left: 27px solid var(--accent-ink);
  }
  #startBtn small { font-size: 15px; font-weight: 900; letter-spacing: .14em; color: inherit; }
  #startBtn.playing {
    border-color: var(--play); background: var(--play); color: var(--play-ink);
    box-shadow: 0 0 0 5px color-mix(in srgb, var(--play) 18%, transparent), var(--shadow);
  }
  #startBtn.playing .tri { border: none; width: 25px; height: 25px; margin: 0; border-radius: 5px; background: var(--play-ink); }
  #partBtn {
    grid-area: part;
    border: 3px solid var(--accent); background: var(--surface-2); gap: 2px;
    box-shadow: var(--shadow);
  }
  #partBtn .letter { font-size: 34px; font-weight: 900; line-height: 1; color: var(--accent); }
  #partBtn small { font-size: 11px; font-weight: 800; letter-spacing: 0.1em; color: var(--text); }
  #partBtn.queued { border-color: var(--fill); background: color-mix(in srgb, var(--fill) 16%, var(--surface)); }
  #partBtn.queued .letter { color: var(--fill); }

  /* ================= SETLIST ================= */
  #setlistHead { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 8px; flex-shrink: 0; }
  #view-setlist h2 { font-size: 22px; font-weight: 600; }
  #cloudStatus { font-size: 11px; color: var(--text-dim); }
  #cloudStatus.online { color: var(--play); }
  #cloudStatus.error { color: var(--fill); }
  #setlistMode { align-self: center; margin: 0 20px 8px; flex-shrink: 0; }
  #setlistRows, #publicSongRows { flex: 1; overflow-y: auto; min-height: 0; }
  #setlistRows[hidden], #publicSongRows[hidden] { display: none; }
  .song-row {
    display: flex; align-items: center; gap: 10px; cursor: pointer;
    padding: 12px 16px; border-bottom: 1px solid var(--border); min-height: 64px;
  }
  .song-row.current { box-shadow: inset 4px 0 0 var(--accent); background: var(--surface); }
  .song-row.current .name { color: var(--accent); }
  .song-row.dragging { opacity: .55; background: var(--surface); }
  .song-row .info { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .song-row .name { font-size: 17px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-row .meta { display: flex; align-items: center; gap: 8px; }
  .song-row .meta .groove { background: var(--surface-2); border-radius: var(--radius-s); padding: 3px 10px; font-size: 12px; font-weight: 600; }
  .song-row .meta .bpm { font-size: 13px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .song-row .edit {
    width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 16px;
  }
  .song-row .grip {
    width: 40px; height: 48px; flex-shrink: 0; touch-action: none; cursor: grab;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 18px; letter-spacing: 2px;
  }
  #setlistEmpty { padding: 24px 20px; font-size: 15px; color: var(--text-dim); }
  #publicSongEmpty { padding: 24px 20px; font-size: 15px; color: var(--text-dim); }
  .song-row .publicAdd {
    min-width: 92px; height: 42px; padding: 0 12px; border-radius: 12px;
    background: var(--accent); color: var(--accent-ink); font-size: 12px; font-weight: 800;
  }
  .song-row .publicDelete {
    width: 42px; height: 42px; border-radius: 12px; background: var(--surface-2);
    color: var(--danger); font-size: 16px; font-weight: 800;
  }
  .song-row .publicActions { display: flex; align-items: center; gap: 6px; }
  .song-row .ownerMark { font-size: 11px; color: var(--accent); font-weight: 700; }
  .bottomBtnWrap { padding: 12px 16px calc(20px + env(safe-area-inset-bottom)); flex-shrink: 0; }
  #addSongBtn {
    width: 100%; height: 52px; border-radius: var(--radius-m);
    background: var(--accent); color: var(--accent-ink); font-size: 16px; font-weight: 700;
  }

  /* ================= EDITOR ================= */
  #view-editor { gap: 0; }
  #edTop { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px 8px; flex-shrink: 0; }
  #edName {
    flex: 1; min-width: 0; background: none; border: none; outline: none;
    font-size: 22px; font-weight: 600; color: var(--text);
  }
  #edName::placeholder { color: var(--text-dim); }
  #edPreview {
    width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid var(--accent); color: var(--accent); font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  #edPreview.on { background: var(--accent); color: var(--accent-ink); }
  #edTopActions { display: flex; align-items: center; gap: 8px; }
  #edSettingsToggle {
    width: 44px; height: 44px; border-radius: 12px; background: var(--surface-2);
    color: var(--text-dim); font-size: 18px;
  }
  .edRow { display: flex; align-items: center; gap: 10px; padding: 4px 16px 8px; flex-wrap: wrap; flex-shrink: 0; }
  #edCore { justify-content: space-between; }
  #edCoreMain, #edRhythmControls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  #edFocus { width: 42px; padding: 8px 0; font-size: 18px; }
  #edSettings {
    display: flex; align-items: center; gap: 8px; padding: 4px 16px 10px;
    flex-wrap: wrap; flex-shrink: 0;
  }
  #edSettings[hidden] { display: none; }
  #edSettings #edSource { flex: 1; min-width: 160px; }
  #edSettings #edDelete { color: var(--danger); }
  .segmented { display: flex; background: var(--surface); border-radius: 12px; padding: 3px; }
  .segmented button { padding: 8px 18px; border-radius: 10px; color: var(--text-dim); font-size: 14px; font-weight: 600; }
  .segmented button.active { background: var(--surface-2); color: var(--accent); font-weight: 700; box-shadow: var(--shadow); }
  select.chipSelect, .chipBtn {
    background: var(--surface-2); border: none; border-radius: var(--radius-s);
    padding: 9px 14px; font-size: 13px; font-weight: 600; appearance: none; -webkit-appearance: none;
  }
  .edToolBtn {
    min-height: 38px; padding: 8px 13px; border-radius: var(--radius-s);
    background: var(--surface-2); font-size: 13px; font-weight: 700;
  }
  .edToolBtn:disabled { opacity: .42; cursor: default; }
  .edTempo {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface-2); border-radius: var(--radius-s); padding: 4px;
  }
  .edTempo .cap { padding: 0 5px 0 7px; }
  .edTempo button {
    width: 34px; height: 34px; border-radius: 8px; background: var(--surface);
    font-size: 19px; font-weight: 700;
  }
  .edTempo input {
    width: 48px; background: none; border: 0; outline: 0; text-align: center;
    font-size: 15px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums;
    appearance: textfield;
  }
  .edTempo input::-webkit-inner-spin-button { appearance: none; }
  label.chipNum {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface-2); border-radius: var(--radius-s); padding: 5px 10px 5px 14px;
    font-size: 13px; font-weight: 600; color: var(--text-dim);
  }
  label.chipNum input {
    width: 52px; background: none; border: none; outline: none;
    font-size: 14px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums;
  }
  #edMsg { padding: 0 16px 6px; font-size: 13px; font-weight: 600; color: var(--play); flex-shrink: 0; }
  #edMsg:empty { display: none; }

  #edGridWrap { flex: 1; overflow: auto; min-height: 0; padding: 8px 16px; }
  #edGrid { display: flex; flex-direction: column; gap: 9px; width: 100%; min-width: 0; }
  .ed-instrument-group {
    display: flex; flex-direction: column; gap: 4px; min-width: 0;
    padding-bottom: 9px; border-bottom: 1px solid color-mix(in srgb, var(--border) 55%, transparent);
  }
  .ed-instrument-group:last-child { padding-bottom: 0; border-bottom: 0; }
  .ed-line { display: grid; grid-template-columns: 58px minmax(0, 1fr); align-items: center; gap: 8px; min-width: 0; }
  .ed-label { font-size: 9px; font-weight: 700; letter-spacing: 0.04em; color: var(--text-dim); text-transform: uppercase; white-space: nowrap; }
  .ed-label[data-range]::after {
    content: attr(data-range); display: block; margin-top: 2px;
    font-size: 8px; font-weight: 600; letter-spacing: .05em; opacity: .7;
  }
  .ed-beats { display: grid; grid-template-columns: repeat(var(--step-count), minmax(0, 1fr)); gap: 4px; min-width: 0; }
  .ed-cell {
    width: 100%; aspect-ratio: 1; min-width: 0; border-radius: 8px; cursor: pointer;
    background: var(--surface-2);
    transition: background 120ms ease-out; touch-action: none;
  }
  .ed-cell.beat-start { box-shadow: inset 2px 0 0 color-mix(in srgb, var(--accent) 38%, transparent); }
  .ed-cell[data-v="0.5"] { background: color-mix(in srgb, var(--accent) 40%, var(--surface-2)); }
  .ed-cell[data-v="1"] { background: var(--accent); }
  .ed-cell.playhead { box-shadow: inset 0 0 0 1.5px color-mix(in srgb, var(--accent) 45%, transparent); }
  .ed-cell.playhead:not([data-v]) { background: color-mix(in srgb, var(--surface-2) 80%, var(--text)); }
  @media (min-width: 760px) {
    .ed-line { grid-template-columns: 78px minmax(0, 1fr); }
    .ed-beats { grid-template-columns: repeat(var(--step-count), 48px); }
    .ed-cell { width: 48px; height: 48px; }
  }

  #edActions { display: flex; gap: 8px; padding: 10px 16px calc(16px + env(safe-area-inset-bottom)); flex-shrink: 0; }
  #edActions button { height: 50px; border-radius: var(--radius-m); font-size: 15px; font-weight: 600; }
  #edSave { flex: 1.3; background: var(--accent); color: var(--accent-ink); font-weight: 700; }
  #edPatternCopy, #edPatternPaste { flex: 1; background: var(--surface-2); }
  #edPatternPaste:disabled { opacity: .42; }
  #edCopy { background: var(--surface-2); }
  #edDelete { padding: 0 18px; background: var(--surface-2); color: var(--danger); }
  #edDelete[hidden] { display: none; }

  @media (max-width: 620px) {
    .ed-cell { height: 44px; aspect-ratio: auto; }
    #edRhythmControls { gap: 6px; flex-wrap: nowrap; width: 100%; }
    #edRhythmControls .chipSelect { padding: 8px 9px; font-size: 12px; }
    #edRhythmControls .edTempo { gap: 3px; }
    #edRhythmControls .edTempo .cap { padding-inline: 3px; font-size: 10px; }
    #edRhythmControls .edTempo button { width: 30px; height: 32px; }
    #edRhythmControls .edTempo input { width: 38px; font-size: 14px; }
    #view-editor.focus-mode #edTop,
    #view-editor.focus-mode #edRhythmControls,
    #view-editor.focus-mode #edSettings,
    #view-editor.focus-mode #edActions { display: none; }
    #view-editor.focus-mode #edCore { padding-top: 8px; }
    #view-editor.focus-mode #edCoreMain { width: 100%; justify-content: space-between; flex-wrap: nowrap; }
    html.editor-focus #tabsWrap,
    html.editor-focus #appearanceControls { display: none; }
    #view-editor.focus-mode #edGridWrap { padding-top: 4px; }
  }
  @media (min-width: 621px) { #edFocus { display: none; } }

  /* ================= SHEETS ================= */
  #sheetDim {
    position: fixed; inset: 0; background: rgb(0 0 0 / .4); z-index: 40;
  }
  #sheetDim[hidden] { display: none; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
    max-width: 560px; margin: 0 auto;
    background: var(--surface); border-radius: var(--radius-l) var(--radius-l) 0 0;
    box-shadow: 0 -4px 24px rgb(0 0 0 / .5);
    padding: 14px 20px calc(24px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 18px;
    max-height: 85dvh; overflow-y: auto;
  }
  .sheet[hidden] { display: none; }
  .sheet .handle { width: 40px; height: 4px; border-radius: 2px; background: var(--border); align-self: center; flex-shrink: 0; }
  .sheet .sheetHead { display: flex; align-items: center; justify-content: space-between; }
  .sheet .sheetHead h3 { font-size: 22px; font-weight: 600; }
  .sheet .close {
    width: 36px; height: 36px; border-radius: 12px; background: var(--surface-2);
    color: var(--text-dim); display: flex; align-items: center; justify-content: center; font-size: 15px;
  }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field input[type="text"] {
    background: var(--surface-2); border: none; outline: none; border-radius: 12px;
    padding: 14px 16px; font-size: 17px; color: var(--text);
  }
  .chipWrap { display: flex; gap: 8px; flex-wrap: wrap; }
  .chipWrap .chip { background: var(--surface-2); padding: 8px 14px; font-size: 14px; box-shadow: none; }
  .chipWrap .chip.active { background: var(--accent); color: var(--accent-ink); }
  .stepperRow { display: flex; align-items: center; justify-content: space-between; }
  .stepper { display: flex; align-items: center; gap: 12px; }
  .stepper button {
    width: 44px; height: 44px; border-radius: 12px; background: var(--surface-2);
    font-size: 22px; display: flex; align-items: center; justify-content: center;
  }
  .stepper .val { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 56px; text-align: center; }
  .sliderField { display: flex; flex-direction: column; gap: 10px; }
  .sliderField .head { display: flex; justify-content: space-between; }
  .sliderField .head .v { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
  input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 28px; background: none; }
  input[type="range"] { --range-pct: 0%; }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 6px; border-radius: 3px;
    background: linear-gradient(to right, var(--accent) 0 var(--range-pct), var(--surface-2) var(--range-pct) 100%);
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%;
    background: var(--text); box-shadow: var(--shadow); margin-top: -11px;
  }
  input[type="range"]::-moz-range-track { height: 6px; border-radius: 3px; background: var(--surface-2); }
  input[type="range"]::-moz-range-progress { height: 6px; border-radius: 3px; background: var(--accent); }
  input[type="range"]::-moz-range-thumb { width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--text); box-shadow: var(--shadow); }
  .sheetBtn { height: 52px; border-radius: var(--radius-m); background: var(--accent); color: var(--accent-ink); font-size: 16px; font-weight: 700; }
  .sheetBtnDanger { height: 48px; border-radius: var(--radius-m); background: var(--surface-2); color: var(--danger); font-size: 15px; font-weight: 600; }
  .sheetBtnDanger[hidden] { display: none; }

  #ipadControls { display: none; }

  /* ================= IPAD LANDSCAPE (3e / 3f) ================= */
  @media (min-width: 900px) and (orientation: landscape) {
    body { align-items: stretch; }
    #tabsWrap {
      position: fixed; z-index: 20; top: 32px; left: 36px;
      width: auto; padding: 0; justify-content: flex-start;
    }
    #tabs { flex-direction: row; width: auto; gap: 0; padding: 3px; }
    #tabs button {
      min-height: 0; padding: 9px 22px; border-radius: 10px; display: block;
    }
    #tabs button .tabIcon { display: none; }
    #appearanceControls { top: 32px; right: 36px; }

    main { max-width: none; height: 100%; }

    #view-player {
      display: grid; min-width: 0;
      grid-template-columns: minmax(520px, 3fr) minmax(360px, 2fr);
      grid-template-rows: 58px minmax(0, 1fr) 280px;
      grid-template-areas:
        "song song"
        "stage panel"
        "transport transport";
      gap: 20px; padding: 24px 36px 26px;
    }
    #view-player[hidden] { display: none; }
    #songBar { grid-area: song; padding: 0; align-self: center; justify-self: center; width: 360px; }
    #stageCard {
      grid-area: stage; margin: 0; padding: clamp(28px, 4vh, 44px) 32px 150px;
      min-height: 0; justify-content: center; gap: clamp(14px, 2.2vh, 22px);
    }
    #bpmBig { font-size: clamp(110px, 14vw, 168px); }
    #beatDot { width: 24px; height: 24px; }
    #stateBand { height: 56px; font-size: 23px; }
    #beatRow .seg { height: 14px; }

    #grooveSec {
      grid-area: stage; z-index: 2; align-self: end; padding: 0 32px 30px;
      background: transparent; box-shadow: none;
    }
    #grooveSec .chipRow { flex-wrap: wrap; overflow: visible; }
    #controlsSec { display: none; }
    #ipadControls {
      grid-area: panel; display: flex; flex-direction: column; gap: 22px;
      min-width: 0; padding: 26px 24px 82px; background: var(--surface);
      border-radius: var(--radius-l); box-shadow: var(--shadow);
    }
    #ipadControls .tempoLine { display: flex; align-items: center; gap: 10px; }
    #ipadControls .tempoLine .cap { margin-right: auto; }
    #ipadControls .tempoLine button { width: 44px; height: 44px; border-radius: 12px; background: var(--surface-2); font-size: 20px; }
    #ipadBpm { min-width: 44px; text-align: center; font-size: 20px; font-weight: 700; }
    #ipadTap { width: 60px !important; border: 1.5px solid var(--accent); color: var(--accent); background: transparent !important; font-size: 12px !important; font-weight: 800; }
    #ipadControls .sliderField { gap: 8px; }
    #ipadKitChips { display: flex; gap: 8px; flex-wrap: wrap; }
    #dirtyBar {
      grid-area: panel; z-index: 2; align-self: end; margin: 0 24px 24px;
    }
    #transport {
      grid-area: transport; margin: 0 auto; padding: 0;
      width: min(980px, 88vw); grid-template-columns: 3fr 2fr; grid-template-rows: 104px 156px;
      gap: 16px;
    }
    #partBtn .letter { font-size: 40px; }
    #fillBtn { font-size: 21px; }
    #startBtn small { font-size: 17px; }
    #startBtn .tri { border-top-width: 20px; border-bottom-width: 20px; border-left-width: 33px; }

    #view-setlist { padding: 20px 7vw 24px; }
    #view-setlist h2 { font-size: 28px; }
    .song-row { min-height: 76px; padding: 14px 20px; border-radius: 14px; }
    #setlistRows { display: flex; flex-direction: column; gap: 4px; }
    .bottomBtnWrap { padding-bottom: 0; }

    #view-editor {
      display: grid; min-width: 0; padding: 24px 28px;
      grid-template-columns: minmax(250px, .8fr) minmax(0, 2.6fr);
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      grid-template-areas:
        "title grid"
        "core grid"
        "settings grid"
        "actions actions";
      gap: 12px 24px;
    }
    #view-editor[hidden] { display: none; }
    #edTop { grid-area: title; padding: 0; align-self: start; }
    #edCore { grid-area: core; padding: 0; align-self: start; }
    #edSettings { grid-area: settings; padding: 0; align-self: start; align-content: start; }
    #edGridWrap {
      grid-area: grid; padding: 20px; background: var(--surface);
      border-radius: var(--radius-l); box-shadow: var(--shadow);
    }
    #edGrid { gap: 10px; }
    .ed-label { font-size: 11px; }
    #edActions { grid-area: actions; padding: 8px 0 0; }

    .sheet { max-width: 520px; left: auto; right: 28px; bottom: 28px; border-radius: var(--radius-l); }
  }

  @media (min-width: 760px) and (max-width: 899px), (min-width: 760px) and (orientation: portrait) {
    main { max-width: 720px; }
    #stageCard { margin-left: 24px; margin-right: 24px; }
    .chipSec { padding-left: 24px; padding-right: 24px; }
    #transport { padding-left: 48px; padding-right: 48px; }
  }
</style>
<link rel="stylesheet" href="skins/electribe.css">
</head>
<body>

<div id="tabsWrap">
  <div id="tabs">
    <button data-view="player" class="active"><span class="tabIcon" aria-hidden="true">▶</span><span>Speler</span></button>
    <button data-view="setlist"><span class="tabIcon" aria-hidden="true">≡</span><span>Setlist</span></button>
    <button data-view="editor"><span class="tabIcon" aria-hidden="true">▦</span><span>Editor</span></button>
  </div>
</div>
<div id="appearanceControls" aria-label="Weergave-instellingen">
  <select id="skinSelect" aria-label="Kies skin" title="Kies vormgeving">
    <option value="modern">Modern</option>
    <option value="electribe">Electribe</option>
  </select>
  <button id="themeToggle" type="button" aria-label="Wissel kleurthema" title="Wissel licht/donker">Donker</button>
</div>

<main id="view-player">
  <div id="songBar" hidden>
    <button id="prevSongBtn" class="nav">‹</button>
    <div id="songTitleWrap">
      <div id="songName"></div>
      <div id="songPos"></div>
    </div>
    <button id="nextSongBtn" class="nav">›</button>
  </div>

  <div id="stageCard">
    <div id="bpmRow">
      <div id="bpmBig" class="num">112</div>
      <div id="beatDot"></div>
    </div>
    <div id="bpmCap" class="cap">BPM</div>
    <div id="stateBand">GESTOPT</div>
    <div id="beatRow"></div>
  </div>

  <div class="chipSec" id="grooveSec">
    <div class="cap">GROOVE</div>
    <div id="styles" class="chipRow"></div>
  </div>

  <div class="chipSec" id="controlsSec">
    <div class="cap">REGELAARS</div>
    <div class="chipRow">
      <div id="tempoCluster">
        <button id="bpmDown">−</button>
        <div id="bpmSmall" class="num">112</div>
        <button id="bpmUp">+</button>
        <button id="tapBtn">TAP</button>
      </div>
      <button class="chip" id="swingChip">Swing 0%</button>
      <button class="chip" id="humChip">Hum. 0%</button>
      <button class="chip" id="kitChip">Kit</button>
    </div>
  </div>

  <section id="ipadControls" aria-label="Regelaars">
    <div class="tempoLine">
      <span class="cap">TEMPO</span>
      <button id="ipadBpmDown" aria-label="Tempo lager">−</button>
      <span id="ipadBpm" class="num">112</span>
      <button id="ipadBpmUp" aria-label="Tempo hoger">+</button>
      <button id="ipadTap">TAP</button>
    </div>
    <div class="sliderField">
      <div class="head cap"><span>SWING</span><span class="v" id="ipadSwingVal">0%</span></div>
      <input type="range" id="ipadSwing" min="0" max="100" step="1">
    </div>
    <div class="sliderField">
      <div class="head cap"><span>HUMANIZE</span><span class="v" id="ipadHumVal">0%</span></div>
      <input type="range" id="ipadHum" min="0" max="100" step="1">
    </div>
    <div class="sliderField">
      <div class="head cap"><span>VOLUME</span><span class="v" id="ipadVolVal">90%</span></div>
      <input type="range" id="ipadVol" min="0" max="100" step="1">
    </div>
    <div class="field">
      <div class="cap">KIT</div>
      <div id="ipadKitChips" class="chipWrap"></div>
    </div>
  </section>

  <div id="dirtyBar" hidden>
    <div class="dotmark"></div>
    <span id="dirtyText"></span>
    <button id="saveSongBtn">Opslaan bij nummer</button>
  </div>

  <div id="transport">
    <button id="fillBtn" aria-label="Fill afspelen">FILL</button>
    <button id="startBtn" aria-label="Start"><span class="tri"></span><small id="playLabel">START</small></button>
    <button id="partBtn" aria-label="Wissel naar deel B"><span class="letter" id="partLetter">B</span><small>NAAR DEEL</small></button>
  </div>
</main>

<main id="view-setlist" hidden>
  <div id="setlistHead"><h2>Setlist</h2><span id="cloudStatus">Alleen lokaal</span></div>
  <div id="setlistMode" class="segmented">
    <button data-setlist-mode="local" class="active">Mijn setlist</button>
    <button data-setlist-mode="public">Openbaar</button>
  </div>
  <div id="setlistRows"></div>
  <div id="publicSongRows" hidden></div>
  <div class="bottomBtnWrap"><button id="addSongBtn">+ Nummer</button></div>
</main>

<main id="view-editor" hidden>
  <div id="edTop">
    <input id="edName" placeholder="Naam groove" maxlength="24">
    <div id="edTopActions">
      <button id="edSettingsToggle" aria-label="Editorinstellingen" title="Editorinstellingen">⚙</button>
    </div>
  </div>
  <div class="edRow" id="edCore">
    <div id="edCoreMain">
      <div id="edParts" class="segmented">
        <button data-part="A" class="active">A</button>
        <button data-part="B">B</button>
        <button data-part="fill">FILL</button>
      </div>
      <button id="edPreview" aria-label="Voorbeeld afspelen">▶</button>
      <button id="edFocus" class="edToolBtn" aria-label="Focusmodus openen" title="Focusmodus">⛶</button>
    </div>
    <div id="edRhythmControls">
      <select id="edMeter" class="chipSelect" aria-label="Maatsoort"></select>
      <select id="edNote" class="chipSelect" aria-label="Nootwaarde"></select>
      <select id="edBars" class="chipSelect" aria-label="Aantal maten"></select>
      <div class="edTempo">
        <span class="cap">BPM</span>
        <button id="edBpmDown" aria-label="Tempo lager">−</button>
        <input id="edBpm" type="number" min="40" max="220" aria-label="Tempo">
        <button id="edBpmUp" aria-label="Tempo hoger">+</button>
      </div>
    </div>
  </div>
  <div id="edSettings" hidden>
    <select id="edSource" class="chipSelect"></select>
    <button id="edLoad" class="chipBtn">Laden</button>
    <button id="edCopy" class="edToolBtn">Dupliceer groove</button>
    <button id="edDelete" class="edToolBtn" hidden>Verwijder</button>
  </div>
  <div id="edMsg" role="status"></div>
  <div id="edGridWrap"><div id="edGrid"></div></div>
  <div id="edActions">
    <button id="edPatternCopy">Copy</button>
    <button id="edPatternPaste" disabled>Paste</button>
    <button id="edSave">Opslaan</button>
  </div>
</main>

<div id="sheetDim" hidden></div>

<div id="ctrlSheet" class="sheet" hidden>
  <div class="handle"></div>
  <div class="sheetHead"><h3>Regelaars</h3><button class="close" data-close>✕</button></div>
  <div class="sliderField">
    <div class="head cap"><span>SWING</span><span class="v" id="swingVal">0%</span></div>
    <input type="range" id="swingRange" min="0" max="100" step="1">
  </div>
  <div class="sliderField">
    <div class="head cap"><span>HUMANIZE</span><span class="v" id="humVal">0%</span></div>
    <input type="range" id="humRange" min="0" max="100" step="1">
  </div>
  <div class="sliderField">
    <div class="head cap"><span>VOLUME</span><span class="v" id="volVal">90%</span></div>
    <input type="range" id="volRange" min="0" max="100" step="1">
  </div>
  <div class="field">
    <div class="cap">KIT</div>
    <div class="chipWrap" id="kitChips"></div>
  </div>
</div>

<div id="songSheet" class="sheet" hidden>
  <div class="handle"></div>
  <div class="sheetHead"><h3 id="songSheetTitle">Nummer bewerken</h3><button class="close" data-close>✕</button></div>
  <div class="field">
    <div class="cap">NAAM</div>
    <input type="text" id="sngName" maxlength="40" placeholder="Naam nummer">
  </div>
  <div class="field">
    <div class="cap">GROOVE</div>
    <div class="chipWrap" id="sngStyles"></div>
  </div>
  <div class="stepperRow">
    <div class="cap">TEMPO</div>
    <div class="stepper">
      <button id="sngBpmDown">−</button>
      <div class="val num" id="sngBpm">110</div>
      <button id="sngBpmUp">+</button>
    </div>
  </div>
  <div class="sliderField">
    <div class="head cap"><span>SWING</span><span class="v" id="sngSwingVal">0%</span></div>
    <input type="range" id="sngSwing" min="0" max="100" step="5">
  </div>
  <div class="sliderField">
    <div class="head cap"><span>HUMANIZE</span><span class="v" id="sngHumVal">0%</span></div>
    <input type="range" id="sngHum" min="0" max="100" step="5">
  </div>
  <button class="sheetBtn" id="sngSave">Opslaan</button>
  <button class="sheetBtnDanger" id="sngDelete" hidden>Verwijderen</button>
</div>

<script src="app.js"></script>
<script type="module" src="central-store.js"></script>
</body>
</html>
